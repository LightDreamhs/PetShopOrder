# 完整生产配置：443 ssl + 80→443 跳转 + www→根域 + 隐秘路径 + API 反代 + uploads + acme + 安全头。

# 80 端口：证书续期验证 + 跳转 443
server {
    listen 80;
    listen [::]:80;
    server_name 2zg.site www.2zg.site;

    # 续期验证（始终保留，renew-ssl.sh 依赖）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# www → 根域 301（证书需同时覆盖 www.2zg.site）
server {
    listen 443 ssl;
    http2 on;
    server_name www.2zg.site;

    ssl_certificate     /etc/letsencrypt/live/2zg.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/2zg.site/privkey.pem;

    return 301 https://2zg.site$request_uri;
}

# 主 server：根域 443
server {
    listen 443 ssl;
    http2 on;
    server_name 2zg.site;

    ssl_certificate     /etc/letsencrypt/live/2zg.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/2zg.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # 健康检查（转发后端 /health，供外部探针）
    location = /health {
        proxy_pass http://backend:8080/health;
        access_log off;
    }

    # 后端 API 反代（保留 /api/ 前缀）
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传图片（nginx 直读宿主机，不进后端）
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ACME 续期验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Admin 隐秘路径（Hash 模式 + 静态资源）
    location /petshop-admin-7x9k2/ {
        alias /usr/share/nginx/admin/;
        index index.html;
        try_files $uri $uri/ /petshop-admin-7x9k2/index.html;
    }

    # H5 根域（History 模式兜底）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
