# 首次申请证书专用配置：仅监听 80，提供 ACME 验证目录。
# 证书申请成功后，init-ssl.sh 会把 .env.prod 的 NGINX_CONF 改为 ./nginx.conf 并重建 frontend。

server {
    listen 80;
    listen [::]:80;
    server_name 2zg.site www.2zg.site;

    # Let's Encrypt HTTP-01 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 证书尚未签发，不做 443 跳转，避免无限重定向
    location / {
        return 200 "petshop cert init: waiting for ssl\n";
    }
}
