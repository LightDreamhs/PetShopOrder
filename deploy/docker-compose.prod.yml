# 生产三容器编排：mysql + backend + frontend(nginx)
# 用法：docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# 首次启动用 nginx.http-only.conf 申请证书（见 init-ssl.sh），完成后 NGINX_CONF 切到 nginx.conf。

services:
  mysql:
    image: mysql:8.0
    container_name: petorder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-petshop_order}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    # 不映射 3306 到宿主机，仅容器内网络可达
    expose:
      - "3306"
    volumes:
      # 【关键】首次启动（数据目录为空）自动建表 + 插入系统默认配置；漏挂则生产空库、后端查询全失败
      - ../backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - /data/petshop/mysql:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
    networks:
      - petorder-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: petorder-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-petshop_order}
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_DIR: /app/uploads
      SA_TOKEN_TIMEOUT: ${SA_TOKEN_TIMEOUT:-2592000}
      SA_TOKEN_ACTIVE_TIMEOUT: ${SA_TOKEN_ACTIVE_TIMEOUT:-2592000}
      SATOKEN_SAME_SITE: ${SATOKEN_SAME_SITE:-Lax}
      WEBHOOK_AES_KEY: ${WEBHOOK_AES_KEY:-PetShop2026Order!}
      APP_INIT_ADMIN_USERNAME: ${ADMIN_INIT_USERNAME:-admin}
      APP_INIT_ADMIN_PASSWORD: ${ADMIN_INIT_PASSWORD}
      SMS_PROVIDER: ${SMS_PROVIDER:-log}
      ALIYUN_SMS_AK: ${ALIYUN_SMS_AK:-}
      ALIYUN_SMS_SK: ${ALIYUN_SMS_SK:-}
      ALIYUN_SMS_SIGN: ${ALIYUN_SMS_SIGN:-速通互联验证码}
      ALIYUN_SMS_TEMPLATE: ${ALIYUN_SMS_TEMPLATE:-100001}
      TZ: Asia/Shanghai
    volumes:
      - /data/petshop/uploads:/app/uploads
    networks:
      - petorder-net
    # 8080 不映射到宿主机，由 frontend(nginx) 反代

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: petorder-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # NGINX_CONF 默认 http-only（申证书）；init-ssl.sh 成功后切 ./nginx.conf
      - ${NGINX_CONF:-./nginx.http-only.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
      - /data/petshop/uploads:/usr/share/nginx/uploads:ro
    networks:
      - petorder-net

networks:
  petorder-net:
    driver: bridge
