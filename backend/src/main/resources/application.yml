server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petshop_order}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.petshop.order.entity
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true

sa-token:
  cookie:
    http-only: true
    same-site: ${SATOKEN_SAME_SITE:Lax}
    path: /
  token-name: satoken
  # C 端微信扫码场景需要长时间保持登录态：
  #   timeout=30 天：token 绝对有效期，到期必须重新登录
  #   active-timeout=30 天：滑动过期，每次请求框架自动续签「最后活跃时间」，
  #     用户 30 天内任意访问即一直保持登录，扫码进入时 cookie 仍在即可免登
  # 同时 AppAuthServiceImpl 登录时启用 isLastingCookie=true，
  # 让浏览器写出持久化 Cookie（关闭页面/浏览器后仍保留），实现扫码进入自动恢复登录态。
  # 如需服务重启不掉线 / 多实例共享会话，引入 sa-token-redis-jackson + spring-boot-starter-data-redis 即可，
  # 以下配置无需改动。
  timeout: ${SA_TOKEN_TIMEOUT:2592000}
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT:2592000}
  is-read-cookie: true
  is-read-header: false
  is-log: false

app:
  webhook:
    # 兼容历史已加密的 webhook 数据，保留默认值；生产建议通过环境变量 WEBHOOK_AES_KEY 覆盖
    aes-key: ${WEBHOOK_AES_KEY:PetShop2026Order!}
  cors:
    # 跨域允许来源（支持通配 pattern，如 http://192.168.*.*:3000）。
    # 默认空：生产同域访问不触发 CORS；具体来源交给 dev/prod profile 覆盖。
    allowed-origins: []
  init:
    # 默认 BOSS 账号初始化口令，生产务必通过 APP_INIT_ADMIN_PASSWORD 覆盖（DataInitializer 会对弱口令打 WARN）
    admin-username: ${APP_INIT_ADMIN_USERNAME:admin}
    admin-password: ${APP_INIT_ADMIN_PASSWORD:admin123}

file:
  upload-dir: ${UPLOAD_DIR:./uploads}

sms:
  # log（默认兜底）：固定码 1234 放行，便于本地联调
  # aliyun：阿里云号码认证服务 PNVS 真实核验
  provider: ${SMS_PROVIDER:log}
  aliyun:
    access-key-id: ${ALIYUN_SMS_AK:}
    access-key-secret: ${ALIYUN_SMS_SK:}
    sign-name: ${ALIYUN_SMS_SIGN:速通互联验证码}
    template-code: ${ALIYUN_SMS_TEMPLATE:100001}
